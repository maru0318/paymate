<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과천 모임 정산(2026.07.04)</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }
        /* 터치 타겟 최소화 방지 및 깔끔한 스크롤바 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex justify-center items-start py-8 px-2">

    <!-- 메인 컨테이너 -->
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        
        <!-- 상단 헤더 배경 및 타이틀 -->
        <div class="bg-amber-400 p-6 text-slate-900">
            <h1 class="text-2xl font-bold text-center flex items-center justify-center gap-2">
                <span>📊</span> 모임 정산 계산기
            </h1>
        </div>

        <div class="p-6 space-y-6">
            <!-- 모임명 / 날짜 입력 상단 영역 -->
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label for="meetingName" class="text-xs font-bold text-slate-500 uppercase tracking-wide">모임명</label>
                    <input type="text" id="meetingName" value="과천 저녁 모임" 
                           class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-amber-400 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label for="meetingDate" class="text-xs font-bold text-slate-500 uppercase tracking-wide">모임 날짜</label>
                    <input type="date" id="meetingDate" value="2026-07-04"
                           class="w-full px-3.5 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-amber-400 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
                </div>
            </div>

            <!-- 가중치 가이드 도움말 -->
            <div class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 text-xs text-slate-600 space-y-1">
                <p class="font-bold text-slate-800">💡 가중치(비율) 설정 가이드</p>
                <div class="grid grid-cols-2 gap-x-4 gap-y-1 pt-1 text-[11px]">
                    <div>• <span class="font-semibold text-slate-900">1.0</span> : 일반 1인분 부담 (기본값)</div>
                    <div>• <span class="font-semibold text-slate-900">0.5</span> : 술 안 마신 사람 (반값)</div>
                    <div>• <span class="font-semibold text-slate-900">2.0</span> : 동반자 포함 2인분 부담</div>
                    <div>• <span class="font-semibold text-slate-900">0.0</span> : 정산 제외 대상 (면제자)</div>
                </div>
            </div>

            <!-- 멤버 리스트 테이블 영역 -->
            <div>
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-sm font-bold text-slate-700">참석자 지출 및 가중치</h2>
                    <button type="button" onclick="addMemberRow()" 
                            class="px-3.5 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition-all flex items-center gap-1 active:scale-95">
                        ➕ 멤버 추가
                    </button>
                </div>

                <!-- 경고 메시지 토스트 영역 (alert 대용) -->
                <div id="warningBanner" class="hidden mb-3 p-3 bg-red-50 border border-red-100 text-red-600 rounded-xl text-xs font-medium">
                    ⚠️ 최소 한 명의 멤버는 남겨두어야 합니다.
                </div>

                <!-- 멤버 입력 행 컨테이너 -->
                <div id="memberList" class="space-y-3">
                    <!-- 자바스크립트로 렌더링 -->
                </div>
            </div>

            <!-- 계산 실행 버튼 -->
            <button type="button" onclick="calculateWeightedDutchPay()" 
                    class="w-full py-3.5 bg-amber-400 hover:bg-amber-500 active:scale-[0.99] text-slate-900 font-bold rounded-xl shadow-md transition-all text-base">
                정산 결과 계산하기
            </button>

            <!-- 결과 출력 박스 (기본 숨김) -->
            <div id="resultBox" class="hidden border border-slate-100 bg-amber-50/20 rounded-2xl p-5 space-y-4">
                
                <!-- 결과 헤더 -->
                <div class="text-center pb-4 border-b border-dashed border-slate-200">
                    <h3 id="resTitle" class="text-lg font-bold text-slate-900">강남역 저녁 모임</h3>
                    <p id="resDate" class="text-xs text-slate-500 mt-0.5">2026-07-13</p>
                </div>

                <!-- 전체 지출 내역 요약 -->
                <div class="space-y-2">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">총 지출 금액</span>
                        <span id="resTotal" class="font-bold text-slate-900 text-base">0원</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500">총 참여 가중치 합계</span>
                        <span id="resTotalWeights" class="font-bold text-slate-900">0명 몫</span>
                    </div>
                    <div class="flex justify-between text-sm pb-2">
                        <span class="text-slate-500">1지분당 기준 금액 (가중치 1.0 기준)</span>
                        <span id="resUnitAmount" class="font-bold text-indigo-600 text-base">0원</span>
                    </div>
                </div>

                <!-- 구분선 -->
                <div class="border-t border-slate-100 my-1"></div>

                <!-- 개별 정산 상세 리스트 -->
                <div>
                    <h4 class="text-xs font-bold text-slate-400 mb-3 uppercase tracking-wider">개인별 부담액 및 송/수령 정보</h4>
                    <div id="individualResults" class="space-y-2.5">
                        <!-- 계산 결과가 여기에 추가됩니다 -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 오늘 날짜 기본값 자동 적용 (2026년 기준 정상 처리)
        //document.getElementById('meetingDate').value = new Date().toISOString().substring(0, 10);

        // 초기 멤버 샘플 구성 (가중치 개념을 즉시 이해하기 쉽게 다양한 케이스 제공)
        const initialMembers = [
            { name: '해정', amount: 292500, weight: 1.0 },
            { name: '동주', amount: 0, weight: 1.0 },
            { name: '태준', amount: 0, weight: 1.0 },
            { name: '영우', amount: 0, weight: 1.0 }
        ];

        const memberListContainer = document.getElementById('memberList');
        const warningBanner = document.getElementById('warningBanner');

        // 신규 멤버 추가 렌더링 함수
        function addMemberRow(name = '', amount = '', weight = 1.0) {
            warningBanner.classList.add('hidden'); // 경고 배너 닫기

            const row = document.createElement('div');
            row.className = 'member-row flex items-center gap-2 bg-slate-50/70 p-2.5 rounded-xl border border-slate-100 hover:border-slate-200 transition-all';
            row.innerHTML = `
                <div class="flex-1 min-w-[70px]">
                    <input type="text" class="member-name font-bold w-full bg-white px-2.5 py-2 text-sm rounded-lg border border-slate-200 focus:border-amber-400 outline-none transition-all" 
                           placeholder="이름" value="${name}">
                </div>
                <div class="flex-[1.5] min-w-[100px]">
                    <input type="number" class="member-amount w-full bg-white px-2.5 py-2 text-sm rounded-lg border border-slate-200 focus:border-amber-400 outline-none transition-all" 
                           placeholder="지출(원)" value="${amount}" min="0">
                </div>
                <div class="w-[90px] flex items-center gap-1.5 bg-white border border-slate-200 rounded-lg px-2 py-1.5">
                    <span class="text-[10px] text-slate-400 font-bold whitespace-nowrap">비율:</span>
                    <input type="number" class="member-weight w-full text-center text-sm font-bold text-slate-700 outline-none" 
                           value="${weight}" min="0" step="0.1" placeholder="1.0">
                </div>
                <button type="button" onclick="removeMemberRow(this)" 
                        class="text-slate-400 hover:text-red-500 w-8 h-8 rounded-lg hover:bg-slate-100 transition-all flex items-center justify-center font-bold text-lg">
                    ×
                </button>
            `;
            memberListContainer.appendChild(row);
        }

        // 특정 멤버 삭제 기능
        function removeMemberRow(button) {
            const rows = document.querySelectorAll('.member-row');
            if (rows.length > 1) {
                button.closest('.member-row').remove();
                warningBanner.classList.add('hidden');
            } else {
                warningBanner.classList.remove('hidden');
            }
        }

        // 페이지 최초 진입 시 기본 멤버 로드 및 자동계산
        initialMembers.forEach(m => addMemberRow(m.name, m.amount, m.weight));
        calculateWeightedDutchPay();

        // 가중치 적용 더치페이 계산 로직
        function calculateWeightedDutchPay() {
            const rows = document.querySelectorAll('.member-row');
            const mName = document.getElementById('meetingName').value || '모임 정산';
            const mDate = document.getElementById('meetingDate').value || '-';

            let totalSpent = 0;
            let totalWeights = 0;
            const members = [];

            // 1단계: 각 멤버의 입력값을 수집하며 총 지출 및 가중치 합계를 구함
            rows.forEach(row => {
                const nameInput = row.querySelector('.member-name').value.trim();
                const amountInput = row.querySelector('.member-amount').value;
                const weightInput = row.querySelector('.member-weight').value;

                const name = nameInput || '익명';
                const amount = Number(amountInput) || 0; // 지출액 숫자화 보정
                const weight = Math.max(0, Number(weightInput) || 0); // 음수 비율 유입 방지

                totalSpent += amount;
                totalWeights += weight;

                members.push({ name, amount, weight });
            });

            if (members.length === 0) return;

            // 2단계: 가중치 1.0 기준의 단위 단가 계산
            // 가중치 총합이 0일 경우의 제로 디비전 에러(NaN) 방지
            const unitValue = totalWeights > 0 ? (totalSpent / totalWeights) : 0;

            // 결과 영역 데이터 출력
            document.getElementById('resTitle').innerText = mName;
            document.getElementById('resDate').innerText = mDate;
            document.getElementById('resTotal').innerText = totalSpent.toLocaleString() + '원';
            document.getElementById('resTotalWeights').innerText = totalWeights.toFixed(1) + '명 몫';
            document.getElementById('resUnitAmount').innerText = Math.round(unitValue).toLocaleString() + '원';

            const indResultsContainer = document.getElementById('individualResults');
            indResultsContainer.innerHTML = '';

            // 3단계: 가중치에 따른 개인별 부담 금액 및 수급/송금액 산출
            members.forEach(m => {
                // 개인별 목표 부담금 = 가중치 * 가중치 1.0 기준의 기준금액
                const targetBurden = Math.round(m.weight * unitValue);
                
                // 차액 = 본인이 지출한 실제 돈 - 원래 부담해야 할 목표 금액
                const diff = m.amount - targetBurden;

                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl shadow-sm text-sm transition-all hover:shadow';

                let statusBadge = '';
                let amountText = '';

                if (diff > 0) {
                    statusBadge = `<span class="bg-sky-200 text-blue-700 px-2 py-1 rounded-md text-xs font-bold">돌려받기</span>`;
                    amountText = `<span class="text-blue-700 font-bold">+${diff.toLocaleString()}원</span>`;
                } else if (diff < 0) {
                    statusBadge = `<span class="bg-rose-50 text-rose-500 px-2 py-1 rounded-md text-xs font-bold">보내기</span>`;
                    amountText = `<span class="text-rose-500 font-bold">-${Math.abs(diff).toLocaleString()}원</span>`;
                } else {
                    statusBadge = `<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded-md text-xs font-bold">정산 완료</span>`;
                    amountText = `<span class="text-slate-400 font-medium">정확히 일치</span>`;
                }

                item.innerHTML = `
                    <div class="flex items-center gap-2">
                        ${statusBadge}
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-800">${m.name}</span>
                            <span class="text-[11px] text-slate-400 font-medium">
                                부담 지분: ${m.weight}배 (${targetBurden.toLocaleString()}원)
                            </span>
                        </div>
                    </div>
                    <div class="text-right">
                        ${amountText}
                    </div>
                `;
                indResultsContainer.appendChild(item);
            });

            // 결과 박스 렌더링 처리
            const resultBox = document.getElementById('resultBox');
            resultBox.classList.remove('hidden');
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

</body>
</html>
